<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <!-- balises PWA & iOS Éveil -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="S-SYSTEM">
    <meta name="theme-color" content="#05070a">
    
    <!-- Lien vers le Manifest -->
    <link rel="manifest" href="manifest.json">
    
    <!-- Icône pour Apple/iOS (Générée en SVG direct) -->
    <link rel="apple-touch-icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'><rect width='512' height='512' fill='%2305070a'/><circle cx='256' cy='256' r='200' fill='none' stroke='%2300f2ff' stroke-width='16'/><path d='M200 150 L340 150 L220 270 L320 270 L180 400 L230 290 L160 290 Z' fill='%2300f2ff'/></svg>">

    <title>S-SYSTEM | Finance Leveling</title>
    <style>
        :root {
            --bg: #05070a;
            --card: #0d1117;
            --text: #f8fafc;
            --text-dim: #64748b;
            --border: rgba(255, 255, 255, 0.08);
            --rank-color: #00f2ff; 
            --system-blue: #00f2ff;
            --system-gold: #f59e0b;
            --system-red: #ff0033;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0; padding: 15px;
            display: flex; justify-content: center;
            overflow-x: hidden;
        }

        .system-glow {
            position: fixed; top: -250px; right: -250px; width: 700px; height: 700px;
            background: radial-gradient(circle, var(--rank-color) 0%, rgba(0,0,0,0) 75%);
            filter: blur(60px); opacity: 0.2; z-index: -1; pointer-events: none;
        }

        .container { width: 100%; max-width: 1100px; display: flex; flex-direction: column; gap: 20px; }

        @media (min-width: 850px) {
            .container { flex-direction: row; align-items: flex-start; }
            .sidebar { width: 350px; position: sticky; top: 20px; }
            .main-content { flex-grow: 1; }
        }

        .card {
            background: rgba(13, 17, 23, 0.85);
            border-radius: 12px; padding: 24px;
            border: 1px solid var(--border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            backdrop-filter: blur(20px);
            margin-bottom: 20px;
        }

        .system-title { font-size: 0.65rem; letter-spacing: 3px; color: var(--rank-color); text-transform: uppercase; margin-bottom: 10px; font-weight: 800; }
        
        .rank-box { text-align: center; padding: 10px 0; }
        #rank-medal { font-size: 6rem; font-weight: 900; color: var(--rank-color); display: block; text-shadow: 0 0 20px var(--rank-color); }
        .balance-display { font-size: 2.2rem; font-weight: 900; margin: 10px 0; font-family: monospace; }
        
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase; margin-bottom: 5px; }
        input, select {
            width: 100%; background: rgba(0,0,0,0.3); border: 1px solid var(--border);
            padding: 12px; color: white; border-radius: 6px; font-size: 1rem; outline: none;
            font-family: inherit;
        }
        input:focus, select:focus { border-color: var(--system-blue); }
        select option { background: #0d1117; color: white; }

        .btn {
            padding: 12px; border-radius: 8px; border: none; cursor: pointer;
            font-weight: 800; text-transform: uppercase; font-size: 0.7rem;
            width: 100%; transition: 0.3s; margin-top: 10px;
        }
        .btn-primary { background: var(--system-blue); color: #000; }
        .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text-dim); }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .stat-card { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 8px; border: 1px solid var(--border); }
        .stat-val { font-weight: 900; font-size: 1.1rem; display: block; margin-top: 5px; }

        .transaction-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px; border-bottom: 1px solid var(--border);
            font-size: 0.9rem;
        }
        .recur-tag { font-size: 0.6rem; background: rgba(0, 242, 255, 0.1); color: var(--system-blue); padding: 2px 6px; border-radius: 4px; margin-left: 5px; }
        
        /* Badges de Catégories */
        .cat-tag { font-size: 0.55rem; padding: 2px 6px; border-radius: 4px; font-weight: 700; text-transform: uppercase; margin-left: 6px; display: inline-block; vertical-align: middle; }
        .cat-mana { background: rgba(34, 197, 94, 0.15); color: #22c55e; }
        .cat-food { background: rgba(249, 115, 22, 0.15); color: #f97316; }
        .cat-vie { background: rgba(59, 130, 246, 0.15); color: #3b82f6; }
        .cat-stuff { background: rgba(245, 158, 11, 0.15); color: #f59e0b; }
        .cat-invest { background: rgba(168, 85, 247, 0.15); color: #a855f7; }
        .cat-imprevu { background: rgba(239, 68, 68, 0.15); color: #ef4444; }
        .cat-none { background: rgba(255, 255, 255, 0.05); color: var(--text-dim); }

        .t-name { font-weight: 600; align-items: center; }
        .t-amt { font-family: monospace; font-weight: 800; }
        .negative { color: var(--system-red); }
        .positive { color: #22c55e; }

        .progress-container { background: rgba(255, 255, 255, 0.05); height: 6px; margin: 15px 0; border-radius: 10px; }
        #progress-bar { background: var(--rank-color); height: 100%; width: 0%; box-shadow: 0 0 15px var(--rank-color); transition: 0.5s; }
    </style>
</head>
<body>

<div class="system-glow"></div>

<div class="container">
    <div class="sidebar">
        <div class="card">
            <div class="rank-box">
                <div class="system-title">Niveau de Trésorerie</div>
                <span id="rank-medal">E</span>
                <div id="rank-name" style="font-weight: 900; color: var(--rank-color);">NOMADE DU BUDGET</div>
                
                <div class="balance-display"><span id="total-balance">0.00</span>€</div>
                
                <div class="progress-container"><div id="progress-bar"></div></div>
                <div id="daily-allowance" style="font-size: 0.8rem; color: var(--system-gold); font-weight: 700;">
                    MANA JOURNALIER : 0.00€
                </div>
                <p style="font-size: 0.6rem; color: var(--text-dim); margin-top: 5px;">Après déduction des charges récurrentes</p>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <label>Revenus</label>
                    <span id="stat-inc" class="stat-val positive">0€</span>
                </div>
                <div class="stat-card">
                    <label>Dépenses</label>
                    <span id="stat-exp" class="stat-val negative">0€</span>
                </div>
            </div>
        </div>
    </div>

    <div class="main-content">
        <!-- AJOUTER TRANSACTION -->
        <div class="card">
            <div class="system-title">Nouvelle Mission de Flux</div>
            <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 10px; margin-bottom: 10px;">
                <div class="input-group" style="margin: 0;">
                    <label>Libellé (ex: Salaire, UberEats)</label>
                    <input type="text" id="desc" placeholder="Objet de la quête...">
                </div>
                <div class="input-group" style="margin: 0;">
                    <label>Montant (€)</label>
                    <input type="number" id="amount" placeholder="0.00">
                </div>
            </div>
            
            <div class="input-group">
                <label>Type de Flux (Catégorie)</label>
                <select id="category">
                    <option value="vie">🏠 Vie Quotidienne (Courses, Logement...)</option>
                    <option value="food">🍖 Potions & Rations (Courses, Restos, Uber...)</option>
                    <option value="stuff">⚔️ Équipement & Loisirs (Sorties, Jeux, Matériel...)</option>
                    <option value="invest">💎 Cristaux & PEA (Épargne, Investissements...)</option>
                    <option value="imprevu">⚠️ Anomalie / Imprévu (Urgence, Réparation...)</option>
                    <option value="mana">🌀 Source de Mana (Revenu / Salaire)</option>
                </select>
            </div>

            <div style="display: flex; gap: 10px;">
                <button class="btn btn-primary" onclick="addTransaction('income')">+ REVENU</button>
                <button class="btn" style="background: var(--system-red); color: white;" onclick="addTransaction('expense')">- DÉPENSE</button>
            </div>
        </div>

        <!-- DEPENSES RÉCURRENTES -->
        <div class="card">
            <div class="system-title">Charges Récurrentes (Mensuel)</div>
            <div id="recurring-list"></div>
            <div style="margin-top: 15px; border-top: 1px dashed var(--border); padding-top: 15px;">
                <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 10px; margin-bottom: 10px;">
                    <input type="text" id="recur-desc" placeholder="Ex: Netflix, Loyer...">
                    <input type="number" id="recur-amount" placeholder="€">
                </div>
                <div class="input-group">
                    <label>Catégorie Fixe</label>
                    <select id="recur-category">
                        <option value="vie">🏠 Vie Quotidienne</option>
                        <option value="food">🍖 Potions & Rations</option>
                        <option value="stuff">⚔️ Équipement & Loisirs</option>
                        <option value="invest">💎 Cristaux & PEA</option>
                    </select>
                </div>
                <button id="btn-recur-action" class="btn btn-ghost" onclick="addRecurring()" style="color: var(--system-blue); border-color: var(--system-blue);">+ AJOUTER CHARGE FIXE</button>
            </div>
        </div>

        <!-- LISTE DES FLUX -->
        <div class="card">
            <div class="system-title">Historique des Flux de Mana</div>
            <div id="transaction-list"></div>
            <button class="btn btn-ghost" style="margin-top: 20px;" onclick="resetSystem()">RÉINITIALISER TOUT</button>
        </div>
    </div>
</div>

<script>
    let state = JSON.parse(localStorage.getItem('bank_system_v2')) || {
        transactions: [],
        recurring: [],
        lastProcessedMonth: new Date().getMonth()
    };

    let editingRecurringId = null; 

    const RANKS = [
        { name: "SANG-FROID (S)", min: 80, icon: "S", color: "#ff0055" },
        { name: "CHASSEUR D'ÉLITE (A)", min: 60, icon: "A", color: "#f59e0b" },
        { name: "MAGE DE GUERRE (B)", min: 40, icon: "B", color: "#a855f7" },
        { name: "AVENTURIER (C)", min: 20, icon: "C", color: "#3b82f6" },
        { name: "SURVIVANT (D)", min: 5, icon: "D", color: "#22c55e" },
        { name: "NOMADE (E)", min: -999999, icon: "E", color: "#94a3b8" }
    ];

    const CAT_LABELS = {
        mana: { txt: 'Mana', cls: 'cat-mana' },
        food: { txt: 'Potion', cls: 'cat-food' },
        vie: { txt: 'Vie Q.', cls: 'cat-vie' },
        stuff: { txt: 'Stuff', cls: 'cat-stuff' },
        invest: { txt: 'Invest', cls: 'cat-invest' },
        imprevu: { txt: 'Imprévu', cls: 'cat-imprevu' }
    };

    function getCatBadge(catKey) {
        const cat = CAT_LABELS[catKey];
        if (!cat) return `<span class="cat-tag cat-none">Flux</span>`;
        return `<span class="cat-tag ${cat.cls}">${cat.txt}</span>`;
    }

    function save() {
        localStorage.setItem('bank_system_v2', JSON.stringify(state));
        updateUI();
    }

    function checkMonthTransition() {
        const now = new Date();
        const currentMonth = now.getMonth();

        if (state.lastProcessedMonth !== undefined && state.lastProcessedMonth !== currentMonth) {
            let income = 0;
            let expenses = 0;
            let totalRecurring = 0;

            state.recurring.forEach(r => totalRecurring += Math.abs(r.amount));
            state.transactions.forEach(t => {
                if (t.amount > 0) income += t.amount;
                else expenses += Math.abs(t.amount);
            });

            const leftover = income - expenses - totalRecurring;
            state.transactions = [];

            if (leftover > 0) {
                state.transactions.push({
                    id: Date.now(),
                    desc: "💰 Report Trésorerie M-1",
                    amount: leftover,
                    date: now.toISOString(),
                    category: "mana",
                    isRecurring: false
                });
            }

            state.lastProcessedMonth = currentMonth;
            localStorage.setItem('bank_system_v2', JSON.stringify(state));
        }
    }

    function addTransaction(type) {
        const desc = document.getElementById('desc').value;
        const amt = parseFloat(document.getElementById('amount').value);
        const cat = document.getElementById('category').value;
        if (!desc || isNaN(amt)) return;

        state.transactions.push({
            id: Date.now(),
            desc: desc,
            amount: type === 'expense' ? -amt : amt,
            date: new Date().toISOString(),
            category: cat,
            isRecurring: false
        });

        document.getElementById('desc').value = '';
        document.getElementById('amount').value = '';
        save();
    }

    function editRecurring(id) {
        const item = state.recurring.find(r => r.id === id);
        if (!item) return;

        document.getElementById('recur-desc').value = item.desc;
        document.getElementById('recur-amount').value = Math.abs(item.amount);
        document.getElementById('recur-category').value = item.category;

        editingRecurringId = id;
        const btn = document.getElementById('btn-recur-action');
        btn.innerText = "💾 Enregistrer Modification";
        btn.style.borderColor = "var(--system-gold)";
        btn.style.color = "var(--system-gold)";
    }

    function addRecurring() {
        const desc = document.getElementById('recur-desc').value;
        const amt = parseFloat(document.getElementById('recur-amount').value);
        const cat = document.getElementById('recur-category').value;
        if (!desc || isNaN(amt)) return;

        if (editingRecurringId !== null) {
            const item = state.recurring.find(r => r.id === editingRecurringId);
            if (item) {
                item.desc = desc;
                item.amount = -amt;
                item.category = cat;
            }
            editingRecurringId = null;
            const btn = document.getElementById('btn-recur-action');
            btn.innerText = "+ AJOUTER CHARGE FIXE";
            btn.style.borderColor = "var(--system-blue)";
            btn.style.color = "var(--system-blue)";
        } else {
            state.recurring.push({
                id: 'rec-' + Date.now(),
                desc: desc,
                amount: -amt,
                category: cat
            });
        }

        document.getElementById('recur-desc').value = '';
        document.getElementById('recur-amount').value = '';
        save();
    }

    function deleteTransaction(id) {
        state.transactions = state.transactions.filter(t => t.id !== id);
        save();
    }

    function deleteRecurring(id) {
        if (editingRecurringId === id) {
            editingRecurringId = null;
            const btn = document.getElementById('btn-recur-action');
            btn.innerText = "+ AJOUTER CHARGE FIXE";
            btn.style.borderColor = "var(--system-blue)";
            btn.style.color = "var(--system-blue)";
        }
        state.recurring = state.recurring.filter(r => r.id !== id);
        save();
    }

    function resetSystem() {
        if(confirm("Effacer tout l'historique et les charges fixes ?")) {
            state.transactions = [];
            state.recurring = [];
            state.lastProcessedMonth = new Date().getMonth();
            save();
        }
    }

    function updateUI() {
        const list = document.getElementById('transaction-list');
        const recurList = document.getElementById('recurring-list');
        list.innerHTML = '';
        recurList.innerHTML = '';

        let income = 0;
        let expenses = 0;
        let totalRecurring = 0;

        state.recurring.forEach(r => {
            totalRecurring += Math.abs(r.amount);
            recurList.innerHTML += `
                <div class="transaction-item">
                    <div class="t-name">
                        ${r.desc} 
                        <span class="recur-tag">FIXE</span>
                        ${getCatBadge(r.category)}
                    </div>
                    <div class="t-amt negative">
                        ${r.amount.toFixed(2)}€
                        <span style="margin-left:15px; cursor:pointer; color:var(--system-blue);" onclick="editRecurring('${r.id}')">✏️</span>
                        <span style="margin-left:10px; cursor:pointer;" onclick="deleteRecurring('${r.id}')">×</span>
                    </div>
                </div>
            `;
        });

        const displayTransactions = [...state.transactions].reverse();

        displayTransactions.forEach(t => {
            if (t.amount > 0) income += t.amount;
            else expenses += Math.abs(t.amount);

            list.innerHTML += `
                <div class="transaction-item">
                    <div>
                        <div class="t-name">
                            ${t.desc}
                            ${getCatBadge(t.category)}
                        </div>
                        <div style="font-size:0.6rem; color:var(--text-dim)">${new Date(t.date).toLocaleDateString()}</div>
                    </div>
                    <div class="t-amt ${t.amount > 0 ? 'positive' : 'negative'}">
                        ${t.amount > 0 ? '+' : ''}${t.amount.toFixed(2)}€
                        <span style="margin-left:10px; cursor:pointer;" onclick="deleteTransaction(${t.id})">×</span>
                    </div>
                </div>
            `;
        });

        const total = income - expenses - totalRecurring;
        document.getElementById('total-balance').innerText = total.toFixed(2);
        document.getElementById('stat-inc').innerText = income.toFixed(2) + '€';
        document.getElementById('stat-exp').innerText = (expenses + totalRecurring).toFixed(2) + '€';

        const now = new Date();
        const lastDay = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
        const daysLeft = (lastDay - now.getDate()) + 1;
        
        const daily = total > 0 ? (total / daysLeft) : 0;
        document.getElementById('daily-allowance').innerText = `MANA JOURNALIER : ${daily.toFixed(2)}€`;

        let ratio = income > 0 ? (total / income) * 100 : 0;
        if (total < 0) ratio = -1;

        let currentRank = RANKS[5];
        for (let r of RANKS) {
            if (ratio >= r.min) {
                currentRank = r;
                break;
            }
        }

        document.documentElement.style.setProperty('--rank-color', currentRank.color);
        document.getElementById('rank-medal').innerText = currentRank.icon;
        document.getElementById('rank-name').innerText = currentRank.name;
        document.getElementById('progress-bar').style.width = Math.min(Math.max(ratio, 0), 100) + '%';
    }

    checkMonthTransition();
    updateUI();

    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js')
                .then(reg => console.log('Système synchronisé.'))
                .catch(err => console.log('Erreur SW : ', err));
        });
    }
</script>
</body>
</html>
